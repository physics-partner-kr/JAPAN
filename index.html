<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>삿포로 모바일 일정표</title>
    <!-- 웹앱처럼 보이게 하는 메타 태그 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Flag_of_Japan.svg/512px-Flag_of_Japan.svg.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #F2F2F7; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(0, 122, 255, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(0, 122, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 122, 255, 0); } }
        .animate-pulse-ring { animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes bounce-fun {
            0%, 100% { transform: translateY(0) scale(1); }
            30% { transform: translateY(-8px) scale(1.1); }
            50% { transform: translateY(0) scale(0.95); }
            70% { transform: translateY(-4px) scale(1.05); }
            80% { transform: translateY(0) scale(0.98); }
        }
        .animate-bounce-fun { animation: bounce-fun 0.5s cubic-bezier(0.28, 0.84, 0.42, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const MapPin = ({ size = 18, strokeWidth = 2.5 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        );
        const DirectionsIcon = ({ size = 18, strokeWidth = 2.5 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/></svg>
        );
        const PlaneIcon = ({ size = 18, strokeWidth = 2.5 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6 5.8L7 16l-3.5-1L2 16l4.5 4.5 1.5-1.5z"/></svg>
        );
        const CameraIcon = ({ size = 24, strokeWidth = 2.5 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
                <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>
            </svg>
        );

        // 일정 데이터 - 인천공항(T2)에 네이버 지도 맞춤 URL 추가 완료
        const itineraryData = [
            { id: 0, day: "Day 1", date: "7/3 금", month: 7, dateNum: 3, events: [
                { 
                    time: "07:30", 
                    title: "인천공항 도착 (T2)", 
                    desc: "제2여객터미널 도착 및 탑승 준비", 
                    country: "KR", 
                    emoji: "🛫", 
                    mapQuery: "인천국제공항 제2여객터미널",
                    customSearchUrl: "https://map.naver.com/p/search/인천국제공항%20제2여객터미널",
                    customDirUrl: "https://map.naver.com/p/directions/-/인천국제공항%20제2여객터미널/-/-/"
                },
                { time: "08:30", title: "면세품 인도 및 식사", desc: "", country: "KR", noMap: true, emoji: "🛍️" },
                { time: "10:15", title: "OZ174 출발", desc: "삿포로행 안전비행", isFlight: true, country: "KR", emoji: "✈️" },
                { time: "14:00", title: "입국심사 및 숙소 이동", desc: "버스로 약 1시간 30분 소요", country: "JP", noMap: true, emoji: "🚌" },
                { time: "15:00", title: "Randor Residential Hotel", desc: "체크인 및 짐 보관", country: "JP", mapQuery: "Randor Residential Hotel Sapporo Suites", emoji: "🏨" },
                { time: "15:30", title: "점심식사: 스프카레 스아게+", desc: "브레이크 없음, 웨이팅 확인", country: "JP", mapQuery: "스프카레 스아게 플러스 삿포로", emoji: "🍛" },
                { time: "17:00", title: "후식 카페 투어", desc: "바리스타트/러브에스프레소 등", country: "JP", mapQuery: "Baristart Coffee 삿포로", emoji: "☕" },
                { time: "17:30", title: "다누키코지/삿포로역", desc: "미츠코시, 파르코, 홋카이도청", country: "JP", mapQuery: "다누키코지 상점가 삿포로", emoji: "🏙️" },
                { time: "19:30", title: "우니 무라카미", desc: "워크인 방문", country: "JP", mapQuery: "우니 무라카미 삿포로", emoji: "🍣" },
                { time: "20:30", title: "오도리 공원", desc: "산책하며 소화시키기 ♣", country: "JP", mapQuery: "오도리 공원 삿포로", emoji: "🌳" },
                { time: "21:30", title: "징기스칸 시로쿠마", desc: "예약 완료", country: "JP", mapQuery: "징기스칸 시로쿠마 삿포로", customUrl: "https://maps.app.goo.gl/piq2ApCGAjaLWYc29", emoji: "🥩" },
                { time: "22:30", title: "시메파페~ 야호~", desc: "파르페커피술사토 등 투어", country: "JP", mapQuery: "파르페테리아 팔 삿포로", customUrl: "https://maps.app.goo.gl/4DYj8A7Qrgdr4v3x7", emoji: "🍨" }
            ]},
            { id: 1, day: "Day 2", date: "7/4 토", month: 7, dateNum: 4, events: [
                { time: "09:30", title: "다이와 로이넷 호텔 집합", desc: "투어 집결지", country: "JP", mapQuery: "다이와 로이넷 호텔 삿포로 스스키노", emoji: "📍" },
                { time: "10:00", title: "흰그림자 투어 진행", desc: "저지밀크, 후라노 메론, 라벤더 아이스크림", country: "JP", noMap: true, emoji: "📸" },
                { time: "22:30", title: "호텔 야식", desc: "유바리멜론 + 맥주, 푸딩 ㅇ.<~♥", country: "JP", noMap: true, emoji: "🍮" }
            ]},
            { id: 2, day: "Day 3", date: "7/5 일", month: 7, dateNum: 5, events: [
                { time: "11:00", title: "다누키코지 상점가", desc: "상점가 구경", country: "JP", mapQuery: "다누키코지 상점가 삿포로", emoji: "🛍️" },
                { time: "12:00", title: "오도리공원 (구운옥수수)", desc: "구운옥수수 간식", country: "JP", mapQuery: "오도리 공원 삿포로", emoji: "🌽" },
                { time: "14:00", title: "삿포로역 -> 오타루", desc: "JR 우측 창가 자리 추천", country: "JP", mapQuery: "삿포로역", emoji: "🚂" },
                { time: "15:00", title: "구 테미야선 기찻길", desc: "오타루 오르골당 본관", country: "JP", mapQuery: "오타루 오르골당 본관", emoji: "🛤️" },
                { time: "15:30", title: "르타오 본점", desc: "플러스 매장 맛도리", country: "JP", mapQuery: "르타오 파토스 오타루", emoji: "🍰" },
                { time: "17:00", title: "오타루 마자스시 본점", desc: "3인 예약", country: "JP", mapQuery: "오타루 마사즈시 본점", emoji: "🍣" },
                { time: "18:00", title: "소라치 1984", desc: "JR 개찰구 안 스탠딩 바 (생맥주!)", country: "JP", mapQuery: "소라치 1984 삿포로", customUrl: "https://maps.app.goo.gl/mDGrmvMpP4Xisu3p8", emoji: "🍺" },
                { time: "19:00", title: "돈키호테 쇼핑", desc: "", country: "JP", mapQuery: "메가 돈키호테 삿포로 다누키코지 본점", emoji: "🛒" },
                { time: "21:30", title: "야끼니꾸 구루만즈 이토", desc: "", country: "JP", mapQuery: "야끼니꾸 구루만즈 이토 삿포로", emoji: "🥩" },
                { time: "22:30", title: "시메파페~ 야호~", desc: "", country: "JP", mapQuery: "파르페테리아 팔 삿포로", customUrl: "https://maps.app.goo.gl/4DYj8A7Qrgdr4v3x7", emoji: "🍨" }
            ]},
            { id: 3, day: "Day 4", date: "7/6 월", month: 7, dateNum: 6, events: [
                { time: "08:00", title: "키타노구루메테이", desc: "카이센동 + 은대구된장구이", country: "JP", mapQuery: "키타노구루메 삿포로", emoji: "🐟" },
                { time: "10:00", title: "공항 버스 탑승", desc: "", country: "JP", noMap: true, emoji: "🚌" },
                { time: "11:30", title: "치토세 공항", desc: "라멘 가게들 모여있는 곳에서 콘스프라멘 먹기", country: "JP", mapQuery: "신치토세 공항 라멘도장", emoji: "🍜" },
                { time: "14:30", title: "OZ173 출발", desc: "인천 도착", isFlight: true, country: "JP", emoji: "✈️" }
            ]}
        ];

        const timeToMinutes = (timeStr) => {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        };

        const getOS = () => {
            const userAgent = window.navigator.userAgent || window.navigator.vendor || window.opera;
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) return 'iOS';
            if (/android/i.test(userAgent)) return 'Android';
            return 'unknown';
        };

        function App() {
            const [day, setDay] = useState(0);
            const [activeCard, setActiveCard] = useState(null);
            // 🚨 배포용: 실제 현재 시간 연동
            const [currentTime, setCurrentTime] = useState(new Date());
            const [isBouncing, setIsBouncing] = useState(false);
            const [deviceOS, setDeviceOS] = useState('unknown');

            useEffect(() => {
                setDeviceOS(getOS());
                const checkTime = () => setCurrentTime(new Date());
                
                const initialNow = new Date();
                const todayMonth = initialNow.getMonth() + 1;
                const todayDate = initialNow.getDate();
                const activeDayIndex = itineraryData.findIndex(d => d.month === todayMonth && d.dateNum === todayDate);
                
                if (activeDayIndex !== -1) {
                    setDay(activeDayIndex);
                }

                const timer = setInterval(checkTime, 60000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                setActiveCard(null);
            }, [day]);

            const year = currentTime.getFullYear();
            const tripDay1Start = new Date(year, 6, 3, 14, 0, 0); 
            const month = currentTime.getMonth() + 1;
            const dateNum = currentTime.getDate();

            let statusText = "";
            let statusColor = "";
            let dotColor = "";

            if (currentTime < tripDay1Start) {
                const todayDateOnly = new Date(year, currentTime.getMonth(), dateNum);
                const tripStartDateOnly = new Date(year, 6, 3);
                const diffTime = tripStartDateOnly.getTime() - todayDateOnly.getTime();
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                if (diffDays > 0) {
                    statusText = `여행 전 (D-${diffDays})`;
                } else {
                    statusText = `오늘 출발! ✈️`;
                }
                statusColor = "text-[#FF2D55] bg-[#FF2D55]/10";
                dotColor = "bg-[#FF2D55]";
            } else if (month === 7 && dateNum === 3) {
                statusText = "여행 중 (1일차)";
                statusColor = "text-[#007AFF] bg-[#007AFF]/10";
                dotColor = "bg-[#007AFF]";
            } else if (month === 7 && dateNum === 4) {
                statusText = "여행 중 (2일차)";
                statusColor = "text-[#007AFF] bg-[#007AFF]/10";
                dotColor = "bg-[#007AFF]";
            } else if (month === 7 && dateNum === 5) {
                statusText = "여행 중 (3일차)";
                statusColor = "text-[#007AFF] bg-[#007AFF]/10";
                dotColor = "bg-[#007AFF]";
            } else if (month === 7 && dateNum === 6) {
                statusText = "여행 중 (마지막 날)";
                statusColor = "text-[#007AFF] bg-[#007AFF]/10";
                dotColor = "bg-[#007AFF]";
            } else {
                statusText = "여행 완료";
                statusColor = "text-slate-500 bg-slate-200";
                dotColor = "bg-slate-400";
            }

            const isToday = itineraryData[day].month === (currentTime.getMonth() + 1) && itineraryData[day].dateNum === currentTime.getDate();
            const currentMins = currentTime.getHours() * 60 + currentTime.getMinutes();
            const isTripActive = statusText.includes("여행 중");

            const handleBadgeClick = () => {
                if (isBouncing) return;
                setIsBouncing(true);
                setTimeout(() => setIsBouncing(false), 500); 
            };

            const getLensAppUrl = () => {
                if (deviceOS === 'iOS') {
                    return "googleapp://lens"; 
                } else {
                    return "intent://lens.google.com/#Intent;package=com.google.android.googlequicksearchbox;scheme=https;end";
                }
            };

            const getFlightUrl = () => {
                if (deviceOS === 'iOS') {
                    return "flyasiana://";
                } else {
                    return "intent://#Intent;package=com.asiana.flyasiana;scheme=flyasiana;end";
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen relative p-4 pb-24 overflow-hidden">
                    <header className="mb-6 mt-4">
                        <div className="flex justify-between items-end mb-5 px-1">
                            <h1 className="text-[26px] font-extrabold text-slate-900 tracking-tight pl-1">🇯🇵 삿포로 여행</h1>
                            
                            <div 
                                onClick={handleBadgeClick}
                                className={`flex items-center gap-1.5 mb-1 px-2.5 py-1 rounded-full cursor-pointer select-none transition-colors ${statusColor} ${isBouncing ? 'animate-bounce-fun' : ''}`}
                            >
                                <div className={`w-2 h-2 rounded-full ${dotColor} ${isTripActive ? 'animate-pulse-ring' : ''}`}></div>
                                <span className="text-[11px] font-bold tracking-wide">{statusText}</span>
                            </div>
                        </div>
                        
                        <div className="flex bg-[#E5E5EA] p-1 rounded-xl">
                            {itineraryData.map((d, i) => (
                                <button 
                                    key={i} 
                                    onClick={() => setDay(i)} 
                                    className={`flex-1 py-1.5 rounded-lg text-[13px] font-semibold transition-all duration-200 ${day === i ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                >
                                    {d.date}
                                </button>
                            ))}
                        </div>
                    </header>

                    <div className="animate-fade-in-up flex flex-col" key={day}>
                        {itineraryData[day].events.map((e, i) => {
                            const isFlight = e.isFlight;
                            const isKR = e.country === "KR";
                            const noMap = e.noMap;
                            const isManuallyActive = activeCard === i;

                            let isNow = false;
                            if (isToday) {
                                const eventMins = timeToMinutes(e.time);
                                const nextEventMins = i < itineraryData[day].events.length - 1 ? timeToMinutes(itineraryData[day].events[i+1].time) : 24 * 60;
                                if (currentMins >= eventMins && currentMins < nextEventMins) {
                                    isNow = true;
                                }
                            }

                            const isActive = isManuallyActive || isNow;

                            const query = encodeURIComponent(e.mapQuery || e.title);
                            
                            // customSearchUrl, customDirUrl 이 명시되어 있으면 최우선으로 네이버 지도 등을 사용
                            const searchUrl = e.customSearchUrl ? e.customSearchUrl : (e.customUrl ? e.customUrl : `https://www.google.com/maps/search/?api=1&query=${query}`);
                            const dirUrl = e.customDirUrl ? e.customDirUrl : `https://www.google.com/maps/dir/?api=1&destination=${query}`;

                            return (
                                <div 
                                    key={i} 
                                    className="flex gap-3 relative py-3 cursor-pointer group"
                                    onClick={() => setActiveCard(isManuallyActive ? null : i)}
                                >
                                    {i !== itineraryData[day].events.length - 1 && (
                                        <div className={`absolute top-[70px] bottom-[-12px] left-[27px] w-[2px] z-0 transition-colors ${isNow ? 'bg-[#007AFF]/30' : 'bg-slate-200'}`}></div>
                                    )}

                                    <div className="w-[56px] flex flex-col items-center flex-shrink-0 z-10 pt-1 relative">
                                        <span className={`text-[15px] font-black mb-2 tracking-tighter transition-colors duration-300 ${isActive ? 'text-[#007AFF]' : 'text-slate-800'}`}>
                                            {e.time}
                                        </span>
                                        
                                        {isNow && !isManuallyActive && (
                                            <div className="absolute -top-2 bg-[#007AFF] text-white text-[9px] font-black px-1.5 py-0.5 rounded shadow-sm z-20">
                                                NOW
                                            </div>
                                        )}

                                        <div className={`w-[42px] h-[42px] rounded-full bg-white flex items-center justify-center text-xl shadow-sm border-[2px] transition-all duration-400 ease-out ${isActive ? 'border-[#007AFF] scale-125 rotate-12' : 'border-slate-200 group-hover:scale-105'} ${isNow && !isManuallyActive ? 'animate-pulse-ring' : ''}`}>
                                            {e.emoji}
                                        </div>
                                    </div>
                                    
                                    <div className={`flex-1 bg-white p-4 rounded-[20px] border flex justify-between items-center transition-all duration-400 ease-out origin-left ${isActive ? 'scale-[1.03] shadow-[0_12px_30px_rgba(0,122,255,0.15)] border-[#007AFF] ring-4 ring-[#007AFF]/10 z-20' : 'scale-100 shadow-[0_2px_10px_rgba(0,0,0,0.03)] border-slate-100 group-hover:shadow-[0_4px_16px_rgba(0,0,0,0.06)]'}`}>
                                        <div className="flex-1 pr-3">
                                            <div className="mb-2">
                                                <span className="text-[10px] px-2 py-0.5 rounded font-bold tracking-wider bg-slate-100 text-slate-500">
                                                    {isKR ? '🇰🇷 KR' : '🇯🇵 JP'}
                                                </span>
                                            </div>
                                            <h3 className="font-bold text-slate-900 text-[15px] leading-tight mb-1">{e.title}</h3>
                                            <p className="text-[13px] text-slate-500 leading-snug break-keep">{e.desc}</p>
                                        </div>
                                        
                                        {!noMap && (
                                            <div className="flex gap-1.5 flex-shrink-0">
                                                <a 
                                                    href={isFlight ? getFlightUrl() : searchUrl} 
                                                    target={isFlight ? "_self" : "_blank"} 
                                                    rel="noopener noreferrer"
                                                    onClick={(event) => event.stopPropagation()}
                                                    className="w-9 h-9 rounded-full flex items-center justify-center transition-colors bg-[#007AFF]/10 text-[#007AFF] hover:bg-[#007AFF]/20"
                                                >
                                                    {isFlight ? <PlaneIcon /> : <MapPin />}
                                                </a>
                                                {!isFlight && (
                                                    <a 
                                                        href={dirUrl} 
                                                        target="_blank" 
                                                        rel="noopener noreferrer"
                                                        onClick={(event) => event.stopPropagation()}
                                                        className="w-9 h-9 rounded-full flex items-center justify-center transition-colors bg-[#007AFF]/10 text-[#007AFF] hover:bg-[#007AFF]/20"
                                                    >
                                                        <DirectionsIcon />
                                                    </a>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <a 
                        href={getLensAppUrl()}
                        target="_self"
                        rel="noopener noreferrer"
                        className="fixed bottom-8 right-6 w-14 h-14 bg-[#007AFF] text-white rounded-full shadow-[0_4px_16px_rgba(0,122,255,0.4)] flex items-center justify-center hover:scale-105 active:scale-95 transition-transform z-50 lg:right-[calc(50%-200px)]"
                        title="카메라 번역 렌즈 열기"
                    >
                        <CameraIcon />
                    </a>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
