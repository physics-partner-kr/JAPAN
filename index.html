        /* ✈️ 탑승권 Boarding Pass 확장 */

        @keyframes bounce-fun {

        @keyframes toastFade { 0% { opacity: 0; transform: translate(-50%, 12px) scale(0.96); } 15% { opacity: 1; transform: translate(-50%, 0) scale(1); } 78% { opacity: 1; transform: translate(-50%, 0) scale(1); } 100% { opacity: 0; transform: translate(-50%, -10px) scale(0.98); } }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useLayoutEffect, useCallback } = React;

        const MapPin = ({ size = 18, strokeWidth = 2.5 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        );
        const DirectionsIcon = ({ size = 18, strokeWidth = 2.5 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/></svg>
        );

        let audioCtx = null;
        const initAudio = () => {
            if (!audioCtx) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (AudioContextClass) audioCtx = new AudioContextClass();
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playBubbleSound = () => {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } catch(e) {}
        };

        const playTabSound = () => {
            try {
                initAudio();
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(500, audioCtx.currentTime);
                gain1.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc1.connect(gain1); gain1.connect(audioCtx.destination);
                osc1.start(); osc1.stop(audioCtx.currentTime + 0.05);

                setTimeout(() => {
                    if(!audioCtx) return;
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(750, audioCtx.currentTime); 
                    gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12); 
                    osc2.connect(gain2); gain2.connect(audioCtx.destination);
                    osc2.start(); osc2.stop(audioCtx.currentTime + 0.12);
                }, 50);
            } catch(e) {}
        };

        const playMapSound = () => {
            try {
                initAudio();
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain1.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc1.connect(gain1); gain1.connect(audioCtx.destination);
                osc1.start(); osc1.stop(audioCtx.currentTime + 0.05);

                setTimeout(() => {
                    if(!audioCtx) return;
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(1200, audioCtx.currentTime);
                    gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    osc2.connect(gain2); gain2.connect(audioCtx.destination);
                    osc2.start(); osc2.stop(audioCtx.currentTime + 0.1);
                }, 60);
            } catch(e) {}
        };

        const playAirplaneSound = () => {
            try {
                initAudio();
                const bufferSize = audioCtx.sampleRate * 0.6; 
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1; 
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(200, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.3);
                filter.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.6);
                
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.2); 
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6); 
                
                noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                noise.start();
            } catch(e) {}
        };

        const playBadgeSound = () => {
            try {
                initAudio();
                const freqs = [600, 800, 1200]; 
                freqs.forEach((freq, index) => {
                    setTimeout(() => {
                        if (!audioCtx) return;
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
                    }, index * 80); 
                });
            } catch(e) {}
        };

        const triggerVibration = (duration = 30) => {
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(duration);
            }
        };

        const timeToMinutes = (timeStr) => {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        };

        const isSameDay = (a, b) =>
            a.getFullYear() === b.getFullYear() &&
            a.getMonth() === b.getMonth() &&
            a.getDate() === b.getDate();

        const isFlightDeparted = (flightData, isPast, currentMins, nowDateObj, tabDateObj) => {
            if (isPast) return true;
            if (nowDateObj > tabDateObj) return true;
            if (!isSameDay(nowDateObj, tabDateObj)) return false;
            return currentMins >= timeToMinutes(flightData.dep.time);
        };

        const isInBoardingWindow = (flightData, currentMins, nowDateObj, tabDateObj) => {
            if (!isSameDay(nowDateObj, tabDateObj)) return false;
            const depMins = timeToMinutes(flightData.dep.time);
            return currentMins >= depMins - 30 && currentMins < depMins;
        };

        // 7월 3일부터 7월 6일까지의 깔끔한 최종 일정
        const itineraryData = [

                    country: "KR", emoji: "🛫", mapQuery: "인천국제공항 제2여객터미널", hideDir: true 
                },
                { time: "08:30", title: "면세품 인도 및 식사", desc: "", country: "KR", noMap: true, emoji: "🛍️" },
                { 
                    time: "10:15", title: "출국 비행기 탑승 (OZ174)", desc: "", country: "KR", noMap: true, emoji: "✈️",
                    isFlight: true,
                    flightData: {
                        dep: { city: "서울 / 인천", code: "ICN", time: "10:15", term: "터미널2" },
                        arr: { city: "삿포로 / 치토세", code: "CTS", time: "13:00", term: "터미널2" },
                        duration: "2시간45분", type: "직항", flightNo: "OZ174", aircraft: "B777"
                    }
                }, 
                { time: "14:00", title: "입국심사 및 숙소 이동", desc: "버스로 약 1시간 30분 소요", country: "JP", noMap: true, emoji: "🚌" },
                { time: "15:00", title: "Randor Residential Hotel", desc: "체크인 및 짐 보관", country: "JP", mapQuery: "Randor Residential Hotel Sapporo Suites", emoji: "🏨" },
                { time: "15:30", title: "점심식사: 스프카레 스아게+", desc: "브레이크 없음, 웨이팅 확인", country: "JP", mapQuery: "스프카레 스아게 플러스 삿포로", emoji: "🍛" },
                { time: "17:00", title: "후식 카페 투어", desc: "바리스타트/러브에스프레소 등", country: "JP", mapQuery: "Baristart Coffee 삿포로", emoji: "☕" },

                { time: "19:30", title: "우니 무라카미", desc: "워크인 방문", country: "JP", mapQuery: "우니 무라카미 삿포로", emoji: "🍣" },

        const FlightTicket = ({ data, isPast, isActive, isBoardingExpanded, e, themeBg, currentMins, nowDateObj, tabDateObj, eventId, onExpandSpaceChange }) => {
            const ticketRef = useRef(null);
            const [expandTransform, setExpandTransform] = useState('scale(1)');
            const showPremium = !isPast && (isActive || isBoardingExpanded);
            const onExpandRef = useRef(onExpandSpaceChange);
            onExpandRef.current = onExpandSpaceChange;

            useLayoutEffect(() => {
                const el = ticketRef.current;
                if (!el) return;

                const computeScale = () => {
                    if (!isBoardingExpanded) {
                        setExpandTransform('scale(1)');
                        onExpandRef.current?.(eventId, 0);
                        return;
                    }
                    const TARGET_SCALE = 1.25;
                    const cardWidth = el.offsetWidth;
                    const cardHeight = el.offsetHeight;
                    const cardRight = el.getBoundingClientRect().right;
                    const root = el.closest('[data-itinerary-root]');
                    const minLeft = root
                        ? root.getBoundingClientRect().left + parseFloat(getComputedStyle(root).paddingLeft)
                        : cardRight - cardWidth;
                    const maxScale = (cardRight - minLeft) / cardWidth;
                    const scale = Math.min(TARGET_SCALE, Math.max(1, maxScale));
                    setExpandTransform(`scale(${scale.toFixed(3)})`);
                    onExpandRef.current?.(eventId, cardHeight * (scale - 1));
                };

                computeScale();
                window.addEventListener('resize', computeScale);
                return () => window.removeEventListener('resize', computeScale);
            }, [isBoardingExpanded, eventId]);

            const ticketSurfaceClass = isPast
                ? 'bg-slate-50/60 border border-slate-100 opacity-50'
                : showPremium

            let progress = 0;

            if (isPast) {
                progress = 100;

                progress = 0; 
            } else {
                const depMins = timeToMinutes(data.dep.time);
                let arrMins = timeToMinutes(data.arr.time);
                if (arrMins < depMins) arrMins += 24 * 60; 
                
                if (currentMins >= arrMins) {

        const SwipeableCard = ({ e, children, onComplete, onUndo }) => {
            const [translateX, setTranslateX] = useState(0);
            const [isSwiping, setIsSwiping] = useState(false);
            const startXRef = useRef(0);

            const handleTouchStart = (evt) => {
                startXRef.current = evt.touches[0].clientX;
                setIsSwiping(true);
            };

            const handleTouchMove = (evt) => {
                if (!isSwiping) return;
                const currentX = evt.touches[0].clientX;
                const diff = currentX - startXRef.current;
                
                if (!e.isPast) {
                    if (diff > 0 && diff < 120) setTranslateX(diff);
                } else {
                    if (diff < 0 && diff > -120) setTranslateX(diff);
                }
            };

            const handleTouchEnd = () => {
                setIsSwiping(false);
                
                if (!e.isPast && translateX > 60) {
                    triggerVibration(40); 
                    onComplete(); 
                } else if (e.isPast && translateX < -60) {
                    triggerVibration(40); 
                    onUndo(); 
                }
                setTranslateX(0); 
            };

            return (
                <div className="relative flex-1 min-w-0" style={{ touchAction: 'pan-y' }}>
                    {!e.isPast && translateX > 5 && (
                        <div className="absolute inset-y-0 left-0 bg-[#34C759] rounded-[20px] flex items-center pl-4 text-white font-black text-[13px] tracking-wide w-full shadow-inner opacity-90">
                            ✓ 완료 처리
                        </div>
                    )}
                    {e.isPast && translateX < -5 && (
                        <div className="absolute inset-y-0 right-0 bg-[#FF9500] rounded-[20px] flex items-center justify-end pr-4 text-white font-black text-[13px] tracking-wide w-full shadow-inner opacity-90">
                            ↺ 복구하기
                        </div>
                    )}
                    <div 
                        onTouchStart={handleTouchStart}
                        onTouchMove={handleTouchMove}
                        onTouchEnd={handleTouchEnd}
                        style={{ 
                            transform: `translateX(${translateX}px)`, 
                            transition: isSwiping ? 'none' : 'transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1)' 
                        }}
                        className="h-full w-full relative z-10"
                    >
                        {children}
                    </div>
                </div>
            );
        };

        function App() {
            const [day, setDay] = useState(0);
            const [activeCard, setActiveCard] = useState(null);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [isBouncing, setIsBouncing] = useState(false);
            
            const [showConfetti, setShowConfetti] = useState(false);
            const [showSakura, setShowSakura] = useState(false);
            const [showBeer, setShowBeer] = useState(false);
            const [showPlaneTakeoff, setShowPlaneTakeoff] = useState(false);
            const [showPlaneLanding, setShowPlaneLanding] = useState(false);
            const [eventToast, setEventToast] = useState(null);
            const [flightBoardingToggle, setFlightBoardingToggle] = useState({});
            const [flightExpandSpace, setFlightExpandSpace] = useState({});
            
            const [manualState, setManualState] = useState(() => {
                const savedState = localStorage.getItem('sapporoManualState');
                return savedState ? JSON.parse(savedState) : {};
            });

            useEffect(() => {
                localStorage.setItem('sapporoManualState', JSON.stringify(manualState));
            }, [manualState]);

            useEffect(() => {
                const checkTime = () => setCurrentTime(new Date());
                const initialNow = new Date();
                const todayMonth = initialNow.getMonth() + 1;
                const todayDate = initialNow.getDate();
                const activeDayIndex = itineraryData.findIndex(d => d.month === todayMonth && d.dateNum === todayDate);
                
                if (activeDayIndex !== -1) setDay(activeDayIndex);

                const timer = setInterval(checkTime, 10000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                setActiveCard(null);
            }, [day]);

            useEffect(() => {
                const triggerOnce = (key, setter, duration, toastText, toastDelay = 0) => {
                    if (localStorage.getItem(key)) return;
                    if (setter) setter(true);
                    localStorage.setItem(key, "1");
                    if (toastText) {
                        setTimeout(() => {
                            setEventToast(toastText);
                            setTimeout(() => setEventToast(null), 1800);
                        }, toastDelay);
                    }
                    if (setter) setTimeout(() => setter(false), duration);
                };

                const month = currentTime.getMonth() + 1;
                const dateNum = currentTime.getDate();
                const currentMins = currentTime.getHours() * 60 + currentTime.getMinutes();

                if (month === 7 && dateNum === 3) triggerOnce("trip_confetti", setShowConfetti, 2600, "삿포로,\n야~호~");
                if (month === 7 && dateNum === 3 && currentMins >= 615) triggerOnce("trip_takeoff", setShowPlaneTakeoff, 3200, "이륙,\n야~호~~");
                if (month === 7 && dateNum === 3 && currentMins >= 840) triggerOnce("trip_sakura", setShowSakura, 10000, "ようこそ\n北海道！", 8000);
                if (month === 7 && dateNum === 3 && currentMins >= 1080) triggerOnce("trip_beer_d1", setShowBeer, 3500, "かんぱーい!");
                if (month === 7 && dateNum === 4 && currentMins >= 1350) triggerOnce("trip_beer_d2", setShowBeer, 3500, "かんぱーい!");
                if (month === 7 && dateNum === 5 && currentMins >= 1080) triggerOnce("trip_beer_d3", setShowBeer, 3500, "かんぱーい!");
                if (month === 7 && dateNum === 6 && currentMins >= 870) triggerOnce("trip_depart_jp", setShowPlaneTakeoff, 3200, "日本、\nまたね🥲");
                if (month === 7 && dateNum === 6 && currentMins >= 1065) triggerOnce("trip_landing", setShowPlaneLanding, 3200, "김치찌개\n땡기누..🤤🍲");
            }, [currentTime]);

            // 👉 사용자가 스와이프로 복구할 때 아예 키를 지워서 시스템(시간) 판정으로 돌아가게 수정
            const handleEventComplete = (eventId) => {
                setManualState(prev => ({ ...prev, [eventId]: 'completed' }));
            };

            const handleEventUndo = (eventId) => {
                setManualState(prev => {
                    const next = { ...prev };
                    delete next[eventId];
                    return next;
                });
            };

            const year = currentTime.getFullYear();
            const month = currentTime.getMonth() + 1;
            const dateNum = currentTime.getDate();
            const currentMins = currentTime.getHours() * 60 + currentTime.getMinutes();

            let statusText = "";
            let badgeClasses = "";
            let badgeDotColor = "bg-[#FF2D55]";
            let isPulsing = false;

            if (month < 7 || (month === 7 && dateNum < 3)) {
                const todayDateOnly = new Date(year, currentTime.getMonth(), dateNum);
                const tripStartDateOnly = new Date(year, 6, 3);
                const diffDays = Math.ceil((tripStartDateOnly - todayDateOnly) / (1000 * 60 * 60 * 24));
                
                statusText = `출발까지 ${diffDays}일!`;
                badgeClasses = "bg-white text-[#2E2E7C] border-[1.5px] border-[#2E2E7C] shadow-sm";
                badgeDotColor = "bg-[#2E2E7C]";
            } 
            else if (month === 7 && dateNum >= 3 && dateNum <= 6) {
                badgeClasses = "bg-[#007AFF] text-white shadow-[0_4px_12px_rgba(0,122,255,0.35)] border border-white/10";
                badgeDotColor = "bg-white"; 
                isPulsing = true;
                
                if (dateNum === 3) {
                    if (currentMins < 13 * 60) {
                        statusText = "일본 드가자~ 🛫";
                        badgeClasses = "bg-[#FF9500] text-white shadow-[0_4px_12px_rgba(255,149,0,0.35)] border border-white/10";
                    } else {
                        statusText = "삿포로 1일차";
                    }
                } else if (dateNum === 4) {
                    statusText = "삿포로 2일차";
                } else if (dateNum === 5) {
                    statusText = "삿포로 3일차";
                } else if (dateNum === 6) {
                    if (currentMins < 14 * 60 + 30) { 
                        statusText = "삿포로 4일차";
                    } else if (currentMins < 17 * 60 + 45) { 
                        statusText = "한국 드가자~ 🛬";
                        badgeClasses = "bg-[#FF9500] text-white shadow-[0_4px_12px_rgba(255,149,0,0.35)] border border-white/10";
                    } else {
                        statusText = "집가서 쉬자 🏠";
                        badgeClasses = "bg-[#E5E5EA] text-[#8E8E93]";
                        badgeDotColor = "bg-[#8E8E93]";
                        isPulsing = false;
                    }
                }
            } 
            else {
                statusText = "집가서 쉬자 🏠";
                badgeClasses = "bg-[#E5E5EA] text-[#8E8E93]";
                badgeDotColor = "bg-[#8E8E93]";
                isPulsing = false;
            }

            const handleBadgeClick = () => {
                playBadgeSound(); 
                triggerVibration([20, 50, 20]); 
                setIsBouncing(false);
                setTimeout(() => setIsBouncing(true), 10);
            };

            const handleCardClick = (eventId, isFlight, event) => {
                if (isFlight) {
                    playAirplaneSound();
                    triggerVibration(60);

                    // 완전히 완료(과거)된 상태가 아니라면 언제든 터치로 끄고 켤 수 있게!
                    if (event.isPast) return;

                    setFlightBoardingToggle(prev => {
                        const expanded = getBoardingExpanded(event, prev);
                        return { ...prev, [eventId]: !expanded };
                    });
                } else {
                    playBubbleSound();
                    triggerVibration(15);
                    setActiveCard(activeCard === eventId ? null : eventId);
                }
            };

            const handleFlightExpandSpace = useCallback((eventId, space) => {
                setFlightExpandSpace(prev => {
                    if (prev[eventId] === space) return prev;
                    return { ...prev, [eventId]: space };
                });
            }, []);

            const getBoardingExpanded = (e, toggleMap = flightBoardingToggle) => {
                if (!e.isFlight) return false;

                // 1. 터치(수동 조작) 상태를 가장 "먼저" 확인하도록 위로 올림!
                const manual = toggleMap[e.uniqueEventId];
                if (manual === true) return true;
                if (manual === false) return false;

                // 2. 터치 안 했을 때의 기본 자동 동작 (탑승시간엔 커지고, 출발하면 작아짐)
                const nowDateObj = new Date(currentTime.getFullYear(), currentTime.getMonth(), currentTime.getDate());
                if (isFlightDeparted(e.flightData, e.isPast, currentMins, nowDateObj, e.tabDateObj)) return false;
                return isInBoardingWindow(e.flightData, currentMins, nowDateObj, e.tabDateObj);
            };

            let globalHasActiveNow = false;
            const allEventsEvaluated = itineraryData.map((d, dIndex) => {
                const tabDateObj = new Date(year, d.month - 1, d.dateNum);
                return d.events.map((e, eIndex, arr) => {
                    const uniqueEventId = `${dIndex}-${eIndex}`;
                    let isNow = false;
                    let isPast = false;

                    const eventMins = timeToMinutes(e.time);
                    const nextEventMins = eIndex < arr.length - 1 ? timeToMinutes(arr[eIndex + 1].time) : 24 * 60;

                    let naturalIsPast = false;
                    let naturalIsNow = false;

                    const nowDateObj = new Date(currentTime.getFullYear(), currentTime.getMonth(), currentTime.getDate());

                    if (nowDateObj > tabDateObj) {
                        naturalIsPast = true; 
                    } else if (nowDateObj < tabDateObj) {
                        naturalIsPast = false; 
                    } else {
                        if (currentMins >= nextEventMins) naturalIsPast = true;
                        else if (currentMins >= eventMins && currentMins < nextEventMins) naturalIsNow = true;
                    }

                    if (manualState[uniqueEventId] === 'completed') {
                        isPast = true;
                    } else if (manualState[uniqueEventId] === 'uncompleted') {
                        isPast = false;
                        isNow = naturalIsNow; 
                    } else {
                        isPast = naturalIsPast;
                        isNow = naturalIsNow;
                    }

                    if (isNow && !isPast) {
                        globalHasActiveNow = true;
                    }

                    return { ...e, uniqueEventId, originalIndex: eIndex, isNow, isPast, dayIndex: dIndex, tabDateObj };
                });
            }).flat();

            let globalNextEventId = null;
            if (!globalHasActiveNow) {
                const nextEvent = allEventsEvaluated.find(e => !e.isPast);
                if (nextEvent) {
                    globalNextEventId = nextEvent.uniqueEventId;
                }
            }

            const currentDayEvents = allEventsEvaluated.filter(e => e.dayIndex === day);
            const processedEvents = currentDayEvents.map(e => ({
                ...e,
                isNext: e.uniqueEventId === globalNextEventId
            }));

            const activeAndFuture = processedEvents.filter(e => !e.isPast);
            const pastEvents = processedEvents.filter(e => e.isPast);
            const renderedEvents = [...activeAndFuture, ...pastEvents];

            return (
                <>
                {/* 👉 여기부터 레이아웃 재설계: px-4 (여백)을 주고 복잡한 마진 계산을 싹 없앴습니다! */}
                <div className="w-full max-w-md mx-auto min-h-screen relative px-4 flex flex-col" data-itinerary-root>
                    
                    {/* 👉 헤더가 좌우 끝까지 닿게 하려면 -mx-4 px-4 활용 (아주 튼튼한 방식) */}
                    <header className="sticky top-0 z-40 pt-5 pb-5 -mx-4 px-4 bg-[#F2F2F7]/85 backdrop-blur-xl border-b border-transparent transition-all">
                        <div className="flex justify-between items-end mb-4">
                            <h1 className="text-[26px] font-extrabold text-[#2E2E7C] tracking-tight">🇯🇵 삿포로 여행</h1>
                            
                            <div 
                                onClick={handleBadgeClick}
                                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full cursor-pointer select-none transition-colors duration-200 ${badgeClasses} ${isBouncing ? 'animate-bounce-fun' : ''}`}
                            >
                                <div className={`w-2 h-2 rounded-full ${badgeDotColor} ${isPulsing ? 'animate-pulse-white' : ''}`}></div>
                                <span className="text-[11px] font-bold tracking-wide">{statusText}</span>
                            </div>
                        </div>
                        
                        <div className="flex bg-[#E5E5EA] p-1 rounded-xl overflow-x-auto scrollbar-hide">
                            {itineraryData.map((d, i) => (
                                <button 
                                    key={i} 
                                    onClick={() => {
                                        playTabSound(); 
                                        triggerVibration(15); 
                                        setDay(i);
                                    }} 
                                    className={`flex-1 py-1.5 rounded-lg text-[13px] font-semibold transition-all duration-200 whitespace-nowrap px-3 ${day === i ? 'bg-white text-[#2E2E7C] shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                >
                                    {d.date}
                                </button>
                            ))}
                        </div>
                    </header>

                    <div className="flex flex-col mt-4 pb-12 animate-fade-in-up" key={day}>
                        {renderedEvents.map((e, index) => {
                            const isKR = e.country === "KR";
                            const isJP = e.country === "JP";
                            const noMap = e.noMap;
                            const isManuallyActive = !e.isFlight && activeCard === e.uniqueEventId;
                            const isActive = isManuallyActive || e.isNow || e.isNext;
                            const isBoardingExpanded = e.isFlight ? getBoardingExpanded(e) : false;
                            const flightExtraSpace = e.isFlight ? (flightExpandSpace[e.uniqueEventId] || 0) : 0;

                            const themeColor = isKR ? "text-[#FF2D55]/80" : "text-[#007AFF]/80";
                            const themeBg = isKR ? "bg-[#FF2D55]" : "bg-[#007AFF]";
                            const themeLightBg = isKR ? "bg-[#FF2D55]/10" : "bg-[#007AFF]/10";
                            const themeHoverBg = isKR ? "hover:bg-[#FF2D55]/20" : "hover:bg-[#007AFF]/20";
                            const themeFocusClass = isKR ? "focus-card-red" : "focus-card-blue";
                            const themeLine = isKR ? "bg-[#FF2D55]/30" : "bg-[#007AFF]/30";
                            
                            const query = encodeURIComponent(e.mapQuery || e.title);
                            const searchUrl = e.customSearchUrl ? e.customSearchUrl : (e.customUrl ? e.customUrl : `https://www.google.com/maps/search/?api=1&query=${query}`);
                            const dirUrl = e.customDirUrl ? e.customDirUrl : `https://www.google.com/maps/dir/?api=1&destination=${query}`;
                            
                            let emojiContainerClass = `w-[42px] h-[42px] rounded-full bg-white flex items-center justify-center text-xl shadow-sm border-[2px] transition-all duration-200 ease-out `;
                            if (e.isPast) {
                                emojiContainerClass += "border-slate-100 bg-slate-50/50 opacity-40 scale-95";
                            } else if (isActive) {
                                if (e.isFlight) {
                                    emojiContainerClass += "animate-edge-asiana scale-110 z-20 border-transparent"; 
                                } else if (isJP) {
                                    emojiContainerClass += "focus-emoji-blue scale-110";
                                } else if (isKR) {
                                    emojiContainerClass += "focus-emoji-red scale-110";
                                }
                            } else {
                                emojiContainerClass += "border-slate-200 group-hover:scale-105";
                            }

                            return (
                                <div 
                                    key={e.uniqueEventId} 
                                    className={`flex gap-3 relative py-3 cursor-pointer group ${e.isFlight && isBoardingExpanded ? 'flight-row-expanded' : ''} ${isManuallyActive ? 'animate-bounce-fun' : ''}`}
                                    style={e.isFlight ? {
                                        paddingBottom: 12 + flightExtraSpace,
                                        transition: 'padding-bottom 400ms cubic-bezier(0.25, 0.1, 0.25, 1)',
                                    } : undefined}
                                    onClick={() => handleCardClick(e.uniqueEventId, e.isFlight, e)} 
                                >
                                    {index !== renderedEvents.length - 1 && (
                                        <div className={`absolute top-[70px] bottom-[-12px] left-[27px] w-[2px] z-0 transition-all duration-[400ms] ease-out ${e.isNow ? themeLine : 'bg-slate-200'} ${e.isFlight && isBoardingExpanded ? 'opacity-0' : ''}`}></div>
                                    )}

                                    <div className={`w-[56px] flex flex-col items-center flex-shrink-0 z-10 pt-1 relative flight-timeline-col ${e.isFlight && isBoardingExpanded ? 'is-covered' : ''}`}>
                                        <span className={`text-[15px] font-black mb-2 tracking-tighter transition-colors duration-200 ${e.isPast ? 'text-slate-300' : 'text-[#2E2E7C]'}`}>
                                            {e.time}
                                        </span>
                                        
                                        <div className={emojiContainerClass}>
                                            {e.emoji}
                                        </div>
                                    </div>
                                    
                                    <SwipeableCard 
                                        e={e} 
                                        onComplete={() => handleEventComplete(e.uniqueEventId)}
                                        onUndo={() => handleEventUndo(e.uniqueEventId)}
                                    >
                                        {e.isFlight ? (
                                            <FlightTicket 
                                                data={e.flightData} 
                                                isPast={e.isPast} 
                                                isActive={isActive} 
                                                isBoardingExpanded={isBoardingExpanded}
                                                e={e} 
                                                themeBg={themeBg} 
                                                currentMins={currentMins} 
                                                nowDateObj={new Date(currentTime.getFullYear(), currentTime.getMonth(), currentTime.getDate())} 
                                                tabDateObj={e.tabDateObj}
                                                eventId={e.uniqueEventId}
                                                onExpandSpaceChange={handleFlightExpandSpace}
                                            />
                                        ) : (
                                            <div className={`relative p-4 rounded-[20px] transition-all duration-200 ease-out h-full ${e.isPast ? 'bg-slate-50/60 border border-slate-100 shadow-none opacity-40 scale-[0.98]' : (isActive ? `bg-white ${themeFocusClass} z-20` : 'bg-white scale-100 shadow-[0_2px_10px_rgba(0,0,0,0.03)] border border-slate-100 group-hover:shadow-[0_4px_16px_rgba(0,0,0,0.06)]')}`}>
                                                
                                                {e.isNow && !e.isPast && (
                                                    <div className={`absolute top-3 right-4 ${themeBg} text-white text-[9px] font-black px-1.5 py-0.5 rounded shadow-sm z-30 animate-pulse-white`}>
                                                        NOW
                                                    </div>
                                                )}

                                                {e.isNext && !e.isPast && (
                                                    <div className={`absolute top-3 right-4 ${themeBg} text-white text-[9px] font-black px-1.5 py-0.5 rounded shadow-sm z-30 tracking-wider`}>
                                                        NEXT
                                                    </div>
                                                )}

                                                <div className="flex justify-between items-center w-full">
                                                    <div className="flex-1 pr-3">
                                                        <div className="mb-2">
                                                            <span className={`text-[11px] px-2.5 py-0.5 rounded-full font-bold tracking-wider inline-flex items-center gap-1 shadow-sm ${e.isPast ? 'bg-slate-200 text-slate-400' : 'bg-slate-100 text-slate-500'}`}>
                                                                <span className="text-[14px]">{isKR ? '🇰🇷' : '🇯🇵'}</span>
                                                                <span>{isKR ? 'KR' : 'JP'}</span>
                                                            </span>
                                                        </div>
                                                        <h3 className={`font-bold text-[15px] leading-tight mb-1 ${(e.isNow || e.isNext) ? 'pr-10' : ''} ${e.isPast ? 'text-slate-400 line-through' : 'text-[#2E2E7C]'}`}>{e.title}</h3>
                                                        <p className={`text-[13px] leading-snug break-keep ${e.isPast ? 'text-slate-300' : 'text-slate-500'}`}>{e.desc}</p>
                                                    </div>
                                                    
                                                    {!noMap && !e.isPast && (
                                                        <div className="flex gap-1.5 flex-shrink-0 z-10">
                                                            <a 
                                                                href={searchUrl} 
                                                                target="_blank" 
                                                                rel="noopener noreferrer"
                                                                onClick={(event) => {
                                                                    event.stopPropagation();
                                                                    playMapSound(); 
                                                                    triggerVibration(15);
                                                                }}
                                                                className={`w-9 h-9 rounded-full flex items-center justify-center transition-colors duration-200 ${themeLightBg} ${themeColor} ${themeHoverBg}`}
                                                            >
                                                                <MapPin />
                                                            </a>
                                                            {!e.hideDir && (
                                                                <a 
                                                                    href={dirUrl} 
                                                                    target="_blank" 
                                                                    rel="noopener noreferrer"
                                                                    onClick={(event) => {
                                                                        event.stopPropagation();
                                                                        playMapSound(); 
                                                                        triggerVibration(15);
                                                                    }}
                                                                    className={`w-9 h-9 rounded-full flex items-center justify-center transition-colors duration-200 ${themeLightBg} ${themeColor} ${themeHoverBg}`}
                                                                >
                                                                    <DirectionsIcon />
                                                                </a>
                                                            )}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </SwipeableCard>
                                </div>
                            );
                        })}
                    </div>
                </div>

                {showConfetti &&
                    [...Array(35)].map((_, i) => (
                        <div
                            key={"c" + i}
                            className="confetti-piece"
                            style={{
                                left: `${Math.random() * 100}%`,
                                background: ["#FF3B30", "#FF9500", "#FFD60A", "#34C759", "#007AFF", "#AF52DE"][i % 6],
                                animationDelay: `${Math.random() * 0.4}s`
                            }}
                        />
                    ))
                }

                {showSakura &&
                    [...Array(30)].map((_, i) => (
                        <div
                            key={"s" + i}
                            className="sakura"
                            style={{
                                left: `${Math.random() * 100}%`,
                                fontSize: `${18 + Math.random() * 12}px`,
                                animationDuration: `${4 + Math.random() * 3}s`,
                                animationDelay: `${Math.random() * 2}s`
                            }}
                        >
                            🌸
                        </div>
                    ))
                }

                {showBeer &&
                    <div className="beer-cheers">
                        <div className="beer-popup beer-popup-left">🍺</div>
                        <div className="beer-popup beer-popup-center">🍺</div>
                        <div className="beer-popup beer-popup-right">🍺</div>
                    </div>
                }

                {eventToast &&
                    <div className="event-toast"
                         key={eventToast}
                         style={{ whiteSpace: "pre-line" }}>{eventToast}</div>
                }

                {showPlaneTakeoff &&
                    <div className="plane-takeoff">✈️</div>
                }

                {showPlaneLanding &&
                    <div className="plane-landing">🛬</div>
                }
                </>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
